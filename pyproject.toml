[project]
name = "reflex"
version = "0.1.0"
description = "Action kernel MVP — token-based GUI action models"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "datasets>=4.8.4",
    "huggingface-hub>=1.10.1",
    "mlx>=0.31.1",
    "mlx-lm>=0.31.2",
    "peft>=0.18.1",
    "pillow>=12.2.0",
    "torch>=2.11.0",
    "tqdm>=4.67.3",
]

[project.scripts]
prepare-data = "prepare_data:main"
train = "train:main"
benchmark = "benchmark:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["action_tokens", "prepare_data", "train", "benchmark"]
