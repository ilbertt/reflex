[project]
name = "reflex"
version = "0.0.1"
description = "Reflex — direct action heads vs autoregressive text for GUI agents"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "mlx>=0.31.1",
    "mlx-lm>=0.31.2",
    "numpy>=2.0",
]

[project.scripts]
train = "train:main"
demo = "demo:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["chip8", "model", "train", "demo"]
