[project]
name = "reflex"
version = "0.0.1"
description = "A frozen LLM wired to a machine through cross-attention — no text generated"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "mlx>=0.31.1",
    "mlx-lm>=0.31.2",
    "numpy>=2.0",
]

[project.scripts]
train = "reflex.train:main"
demo = "reflex.demo:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["reflex*"]

[dependency-groups]
dev = [
    "unicorn>=2.1.4",
]
