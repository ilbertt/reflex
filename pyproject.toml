[project]
name = "reflex"
version = "0.2.0"
description = "Neural kernel: a model reads raw machine bytes and emits control signals, no text"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "mlx>=0.31.1",
    "numpy>=2.0",
]

[project.scripts]
train = "vm.train:main"
demo = "vm.demo:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["vm*"]
