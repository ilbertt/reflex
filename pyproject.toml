[project]
name = "reflex"
version = "0.0.1"
description = "A frozen LLM wired to a machine through cross-attention — no text generated"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "torch>=2.10.0",
    "transformers>=4.46.0",
    "accelerate>=1.0.0",
    "numpy>=2.0",
]

[project.scripts]
train = "reflex.train:main"
demo = "reflex.demo:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["reflex*"]
